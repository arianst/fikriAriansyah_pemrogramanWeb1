<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Kalkulator Modern</title>

    <style>

        *{
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: Arial, Helvetica, sans-serif;
        }

        body{
            background: linear-gradient(135deg, #1d2671, #c33764);
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .calculator{
            width: 340px;
            background: white;
            padding: 20px;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
        }

        .title{
            text-align: center;
            margin-bottom: 15px;
            color: #333;
        }

        #display{
            width: 100%;
            height: 70px;
            border: none;
            outline: none;
            background: #f3f3f3;
            border-radius: 12px;
            text-align: right;
            font-size: 32px;
            padding: 10px;
            margin-bottom: 20px;
        }

        .buttons{
            display: grid;
            grid-template-columns: repeat(4,1fr);
            gap: 10px;
        }

        button{
            height: 60px;
            border: none;
            border-radius: 12px;
            font-size: 20px;
            cursor: pointer;
            transition: 0.2s;
        }

        button:hover{
            transform: scale(1.05);
        }

        .number{
            background: #eaeaea;
        }

        .operator{
            background: #ff9800;
            color: white;
        }

        .equal{
            background: #4caf50;
            color: white;
            grid-column: span 2;
        }

        .clear{
            background: #f44336;
            color: white;
        }

    </style>
</head>

<body>

    <div class="calculator">

        <h2 class="title">Kalkulator Modern</h2>

        <input type="text" id="display" readonly>

        <div class="buttons">

            <button class="clear" onclick="clearDisplay()">C</button>
            <button class="operator" onclick="deleteLast()">⌫</button>
            <button class="operator" onclick="appendValue('%')">%</button>
            <button class="operator" onclick="appendValue('/')">÷</button>

            <button class="number" onclick="appendValue('7')">7</button>
            <button class="number" onclick="appendValue('8')">8</button>
            <button class="number" onclick="appendValue('9')">9</button>
            <button class="operator" onclick="appendValue('*')">×</button>

            <button class="number" onclick="appendValue('4')">4</button>
            <button class="number" onclick="appendValue('5')">5</button>
            <button class="number" onclick="appendValue('6')">6</button>
            <button class="operator" onclick="appendValue('-')">−</button>

            <button class="number" onclick="appendValue('1')">1</button>
            <button class="number" onclick="appendValue('2')">2</button>
            <button class="number" onclick="appendValue('3')">3</button>
            <button class="operator" onclick="appendValue('+')">+</button>

            <button class="number" onclick="appendValue('0')">0</button>
            <button class="number" onclick="appendValue('.')">.</button>

            <button class="equal" onclick="calculate()">=</button>

        </div>

    </div>

    <script>

        const display = document.getElementById("display");

        function appendValue(value){
            display.value += value;
        }

        function clearDisplay(){
            display.value = "";
        }

        function deleteLast(){
            display.value = display.value.slice(0, -1);
        }

        function calculate(){

            try{
                display.value = eval(display.value);
            }
            catch(error){
                display.value = "Error";
            }

        }

        // Support keyboard
        document.addEventListener("keydown", function(event){

            const key = event.key;

            if(!isNaN(key) || ['+','-','*','/','.','%'].includes(key)){
                appendValue(key);
            }
            else if(key === "Enter"){
                calculate();
            }
            else if(key === "Backspace"){
                deleteLast();
            }
            else if(key === "Escape"){
                clearDisplay();
            }

        });

    </script>

</body>
</html>
